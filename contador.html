<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cuenta regresiva</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

#contador{
font-size:40px;
margin-top:20px;
}

</style>

</head>

<body>

<div>

<h1>Algo especial llegará pronto ❤️</h1>

<div id="contador"></div>

</div>

<script>

const fechaObjetivo = new Date("mar 13, 2026 1:30:00").getTime();

setInterval(function(){

const ahora = new Date().getTime();

const diferencia = fechaObjetivo - ahora;

const dias = Math.floor(diferencia/(1000*60*60*24));
const horas = Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));
const minutos = Math.floor((diferencia%(1000*60*60))/(1000*60));
const segundos = Math.floor((diferencia%(1000*60))/1000);

document.getElementById("contador").innerHTML =
dias+" días "+
horas+" horas "+
minutos+" minutos "+
segundos+" segundos";

if(diferencia < 0){

window.location.href="index.html";

}

},1000);

</script>

</body>
</html>
